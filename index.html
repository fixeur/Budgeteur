<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Budget</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0D0D0D;--paper:#F0EDE6;--card:#E8E4DC;--border:rgba(13,13,13,0.1);
  --ink-40:rgba(13,13,13,0.38);--ink-15:rgba(13,13,13,0.1);
  --accent:#E84B2A;--accent-pale:#FAE8E4;
  --green:#1A7A58;--amber:#A86000;--amber-bg:#F5E3C0;
  --r:12px;
}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;overscroll-behavior:none}
body{padding-bottom:100px}
.hdr{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center}
.month-row{display:flex;align-items:center;gap:8px}
.month-btn{background:none;border:none;cursor:pointer;color:var(--ink-40);font-size:20px;padding:4px;line-height:1}
.month-lbl{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-40)}
.hdr-add{width:34px;height:34px;border-radius:50%;background:var(--ink);color:var(--paper);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:300;line-height:1}
.hero{padding:14px 20px 20px;position:relative}
.hero-eye{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-40);margin-bottom:4px}
.hero-num{font-size:clamp(48px,13vw,76px);font-weight:300;letter-spacing:-0.03em;line-height:1}
.hero-num em{color:var(--accent);font-style:normal}
.hero-meta{display:flex;gap:22px;margin-top:10px}
.hm-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-40)}
.hm-val{font-size:14px;font-weight:500;margin-top:2px}
.hm-val.pos{color:var(--green)}.hm-val.neg{color:var(--accent)}
.ring-wrap{position:absolute;right:18px;top:14px;width:82px;height:82px}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.r-track{fill:none;stroke:rgba(13,13,13,0.1);stroke-width:6}
.r-fill{fill:none;stroke-width:6;stroke-linecap:round}
.ring-lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:15px;font-weight:600;line-height:1}
.ring-lbl small{font-size:9px;color:var(--ink-40);font-weight:400;margin-top:1px;text-transform:uppercase;letter-spacing:.05em}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border)}
.tab{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-40);cursor:pointer;padding:10px 0;margin-right:22px;border-bottom:2px solid transparent}
.tab.active{color:var(--ink);border-bottom-color:var(--ink)}
.slide-wrap{overflow:hidden}
.slide-inner{display:flex;transition:transform .3s ease}
.slide-page{min-width:100%;padding:20px 16px}
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-40);margin-bottom:12px}
.cat-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer}
.cat-row:last-of-type{border-bottom:none}
.cat-ic{width:36px;height:36px;flex-shrink:0;border-radius:8px;background:var(--card);display:flex;align-items:center;justify-content:center}
.cat-ic svg{width:18px;height:18px;fill:none;stroke:var(--ink);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.s-warn .cat-ic{background:var(--amber-bg)}.s-warn .cat-ic svg{stroke:var(--amber)}
.s-over .cat-ic{background:var(--accent-pale)}.s-over .cat-ic svg{stroke:var(--accent)}
.cat-mid{flex:1;min-width:0}
.cat-name{font-size:13px;font-weight:500;margin-bottom:6px}
.cat-track{height:2px;background:var(--ink-15);border-radius:99px;overflow:hidden}
.cat-bar{height:100%;border-radius:99px}
.s-good .cat-bar{background:var(--ink)}.s-warn .cat-bar{background:var(--amber)}.s-over .cat-bar{background:var(--accent)}
.cat-right{text-align:right;flex-shrink:0}
.cat-spent{font-size:14px;font-weight:600}
.s-good .cat-spent{color:var(--ink)}.s-warn .cat-spent{color:var(--amber)}.s-over .cat-spent{color:var(--accent)}
.cat-of{font-size:10px;color:var(--ink-40);margin-top:2px}
.add-cat{width:100%;margin-top:12px;padding:13px;border:1.5px dashed var(--border);border-radius:var(--r);background:none;font-size:12px;font-weight:500;color:var(--ink-40);cursor:pointer;font-family:inherit}
.log-date{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-40);padding:14px 0 8px}
.log-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-ic{width:32px;height:32px;border-radius:8px;background:var(--card);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.log-ic svg{width:15px;height:15px;fill:none;stroke:var(--ink-40);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.log-mid{flex:1}
.log-desc{font-size:13px;font-weight:500}
.log-sub{font-size:11px;color:var(--ink-40);margin-top:1px}
.log-amt{font-size:14px;font-weight:600;color:var(--accent);white-space:nowrap}
.log-del{background:none;border:none;color:rgba(13,13,13,0.2);font-size:20px;cursor:pointer;padding-left:8px;line-height:1;font-family:inherit}
.sav-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
.sav-card::after{content:'';position:absolute;right:-28px;bottom:-28px;width:120px;height:120px;border-radius:50%;border:16px solid rgba(13,13,13,0.07);pointer-events:none}
.sav-eye{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-40);margin-bottom:6px}
.sav-total{font-size:44px;font-weight:300;letter-spacing:-.03em;line-height:1;margin-bottom:16px}
.sav-goal-row{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-40);margin-bottom:7px}
.sav-track{background:var(--ink-15);border-radius:99px;height:3px;overflow:hidden}
.sav-fill{background:var(--ink);height:100%;border-radius:99px}
.sav-to-go{font-size:11px;color:var(--ink-40);margin-top:6px}
.sav-to-go strong{color:var(--ink);font-weight:600}
.sav-btns{display:flex;gap:8px;margin-top:16px}
.sav-btn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;text-transform:uppercase}
.sav-btn-add{background:var(--ink);color:var(--paper)}
.sav-btn-goal{background:var(--ink-15);color:var(--ink)}
.sav-hist-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-40);margin-bottom:10px}
.sav-entry{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.sav-entry:last-child{border-bottom:none}
.sav-note{font-size:13px;font-weight:500}
.sav-date{font-size:11px;color:var(--ink-40);margin-top:1px}
.sav-right{display:flex;align-items:center;gap:6px}
.sav-amt{font-size:14px;font-weight:600;color:var(--green)}
.sav-del{background:none;border:none;color:rgba(13,13,13,0.2);font-size:17px;cursor:pointer;font-family:inherit}
.empty{text-align:center;padding:44px 20px;color:var(--ink-40);font-size:13px;line-height:1.6}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:400;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--paper);border-radius:20px 20px 0 0;padding:16px 20px 48px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.sh-handle{width:32px;height:3px;background:var(--ink-15);border-radius:99px;margin:0 auto 20px}
.sh-title{font-size:17px;font-weight:600;margin-bottom:20px}
.f-lbl{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-40);margin-bottom:6px}
.f-inp{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-size:16px;background:var(--card);color:var(--ink);margin-bottom:14px;outline:none;font-family:inherit}
.f-inp:focus{border-color:var(--ink)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.cat-opt{padding:9px 5px;border-radius:var(--r);border:1.5px solid var(--border);text-align:center;cursor:pointer;font-size:10px;font-weight:500;background:var(--card);color:var(--ink);line-height:1.3}
.cat-opt.sel{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.cat-opt svg{display:block;margin:0 auto 4px;width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.btn-main{width:100%;padding:15px;background:var(--ink);color:var(--paper);border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-transform:uppercase}
.btn-ghost{width:100%;padding:13px;background:none;color:var(--ink-40);border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;margin-top:8px;font-family:inherit}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:9px 16px;border-radius:99px;font-size:12px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="month-row">
    <button class="month-btn" id="btnPrevMonth">‹</button>
    <span class="month-lbl" id="monthLbl"></span>
    <button class="month-btn" id="btnNextMonth">›</button>
  </div>
  <button class="hdr-add" id="btnAdd">+</button>
</div>

<div class="hero" id="heroEl"></div>

<div class="tabs">
  <div class="tab active" id="tab0">Overview</div>
  <div class="tab" id="tab1">Log</div>
  <div class="tab" id="tab2">Savings</div>
</div>

<div class="slide-wrap">
  <div class="slide-inner" id="slideInner">
    <div class="slide-page" id="page0"></div>
    <div class="slide-page" id="page1"></div>
    <div class="slide-page" id="page2"></div>
  </div>
</div>

<!-- Add expense -->
<div class="overlay" id="addOv">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title">Add expense</div>
    <div class="f-lbl">Amount (€)</div>
    <input class="f-inp" id="expAmt" type="number" inputmode="decimal" placeholder="0.00" step="0.01">
    <div class="f-lbl">Description</div>
    <input class="f-inp" id="expDesc" type="text" placeholder="What was it?">
    <div class="f-lbl">Category</div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="f-lbl">Date</div>
    <input class="f-inp" id="expDate" type="date">
    <button class="btn-main" id="btnSaveExp">Save expense</button>
    <button class="btn-ghost" id="btnCancelExp">Cancel</button>
  </div>
</div>

<!-- Edit budget -->
<div class="overlay" id="editOv">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title" id="editTitle">Edit budget</div>
    <div class="f-lbl">Monthly budget (€)</div>
    <input class="f-inp" id="editAmt" type="number" inputmode="decimal">
    <input type="hidden" id="editCatId">
    <button class="btn-main" id="btnSaveBudget">Save</button>
    <button class="btn-ghost" id="btnCancelEdit">Cancel</button>
  </div>
</div>

<!-- New category -->
<div class="overlay" id="newCatOv">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title">New category</div>
    <div class="f-lbl">Name</div>
    <input class="f-inp" id="ncName" type="text" placeholder="e.g. Car, Gym...">
    <div class="f-lbl">Monthly budget (€)</div>
    <input class="f-inp" id="ncBudget" type="number" inputmode="decimal" placeholder="0">
    <button class="btn-main" id="btnSaveNewCat">Add category</button>
    <button class="btn-ghost" id="btnCancelNewCat">Cancel</button>
  </div>
</div>

<!-- Savings -->
<div class="overlay" id="savOv">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title" id="savTitle">Add to savings</div>
    <div class="f-lbl">Amount (€)</div>
    <input class="f-inp" id="savAmt" type="number" inputmode="decimal" placeholder="0">
    <div id="savNoteWrap">
      <div class="f-lbl">Note (optional)</div>
      <input class="f-inp" id="savNote" type="text" placeholder="e.g. July savings">
    </div>
    <button class="btn-main" id="btnConfirmSav">Confirm</button>
    <button class="btn-ghost" id="btnCancelSav">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('toast');
  if (el) { el.textContent = 'ERR: ' + msg + ' L' + line; el.classList.add('show'); }
  return false;
};
// SVG paths for icons
var SVG_PATHS = {
  mom: '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>',
  savings: '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 14a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/><path d="M6 7V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/>',
  food: '<rect x="2" y="7" width="16" height="13" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="19" cy="17" r="3"/><path d="M18 7h4v7"/>',
  groceries: '<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>',
  out: '<path d="M8 22H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2h-3"/><path d="M12 11V22"/><path d="M9 8h6"/>',
  lunch: '<path d="M3 11l19-9-9 19-2-8-8-2z"/>',
  transport: '<rect x="2" y="7" width="20" height="13" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="7" cy="17" r="1.5"/><circle cx="17" cy="17" r="1.5"/><line x1="7" y1="11" x2="17" y2="11"/>',
  phone: '<rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>',
  clothes: '<path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/>',
  misc: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
  custom: '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>'
};

function svgIcon(id, size) {
  size = size || 18;
  var path = SVG_PATHS[id] || SVG_PATHS.custom;
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' + path + '</svg>';
}

var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var DEFAULT_CATS = [
  {id:'mom', name:'Mom repayment', budget:500},
  {id:'savings', name:'Savings', budget:200},
  {id:'food', name:'Food delivery', budget:150},
  {id:'groceries', name:'Groceries', budget:150},
  {id:'out', name:'Going out', budget:100},
  {id:'lunch', name:'Work lunch', budget:50},
  {id:'transport', name:'Transport', budget:30},
  {id:'phone', name:'Phone', budget:6},
  {id:'clothes', name:'Clothes', budget:50},
  {id:'misc', name:'Misc', budget:65}
];

var cats, exps, savTotal, savGoal, savEntries, curMonth, curYear, curTab, savMode, selCatId;

function init() {
  curMonth = 6;
  curYear = 2026;
  curTab = 0;
  savMode = 'add';
  selCatId = '';

  try {
    cats = JSON.parse(localStorage.getItem('bg_cats') || 'null') || DEFAULT_CATS.slice();
    exps = JSON.parse(localStorage.getItem('bg_exps') || 'null') || [{id:'p1',amt:50,desc:'Deliveroo weekend',catId:'food',date:'2026-07-01',mk:'2026-07'}];
    savTotal = parseFloat(localStorage.getItem('bg_st') || '0');
    savGoal = parseFloat(localStorage.getItem('bg_sg') || '8000');
    savEntries = JSON.parse(localStorage.getItem('bg_se') || '[]');
  } catch(err) {
    cats = DEFAULT_CATS.slice();
    exps = [];
    savTotal = 0;
    savGoal = 8000;
    savEntries = [];
  }

  // Wire up all buttons via addEventListener — no onclick attributes on buttons
  document.getElementById('btnPrevMonth').addEventListener('click', function(){ changeMonth(-1); });
  document.getElementById('btnNextMonth').addEventListener('click', function(){ changeMonth(1); });
  document.getElementById('btnAdd').addEventListener('click', openAdd);
  document.getElementById('tab0').addEventListener('click', function(){ switchTab(0); });
  document.getElementById('tab1').addEventListener('click', function(){ switchTab(1); });
  document.getElementById('tab2').addEventListener('click', function(){ switchTab(2); });
  document.getElementById('btnSaveExp').addEventListener('click', saveExp);
  document.getElementById('btnCancelExp').addEventListener('click', function(){ closeOv('addOv'); });
  document.getElementById('btnSaveBudget').addEventListener('click', saveBudget);
  document.getElementById('btnCancelEdit').addEventListener('click', function(){ closeOv('editOv'); });
  document.getElementById('btnSaveNewCat').addEventListener('click', saveNewCat);
  document.getElementById('btnCancelNewCat').addEventListener('click', function(){ closeOv('newCatOv'); });
  document.getElementById('btnConfirmSav').addEventListener('click', confirmSav);
  document.getElementById('btnCancelSav').addEventListener('click', function(){ closeOv('savOv'); });

  // Close overlay on background tap
  var overlays = document.querySelectorAll('.overlay');
  for (var i = 0; i < overlays.length; i++) {
    (function(ov) {
      ov.addEventListener('click', function(e) {
        if (e.target === ov) ov.classList.remove('open');
      });
    })(overlays[i]);
  }

  render();
}

function persist() {
  try {
    localStorage.setItem('bg_cats', JSON.stringify(cats));
    localStorage.setItem('bg_exps', JSON.stringify(exps));
    localStorage.setItem('bg_st', String(savTotal));
    localStorage.setItem('bg_sg', String(savGoal));
    localStorage.setItem('bg_se', JSON.stringify(savEntries));
  } catch(e) { toast('Save error: ' + e.message); }
}

function mk() { return curYear + '-' + (curMonth < 9 ? '0' : '') + (curMonth + 1); }

function spentIn(catId) {
  var key = mk(), t = 0;
  for (var i = 0; i < exps.length; i++) if (exps[i].mk === key && exps[i].catId === catId) t += exps[i].amt;
  return t;
}

function totalSpent() {
  var key = mk(), t = 0;
  for (var i = 0; i < exps.length; i++) if (exps[i].mk === key) t += exps[i].amt;
  return t;
}

function totalBudget() {
  var t = 0;
  for (var i = 0; i < cats.length; i++) t += cats[i].budget;
  return t;
}

function fmt(n) {
  if (n >= 1000) return '\u20ac' + Math.round(n);
  var s = n.toFixed(2).replace(/\.?0+$/, '');
  return '\u20ac' + s;
}

function stat(spent, budget) {
  var p = budget > 0 ? spent / budget : 0;
  return p >= 1 ? 'over' : p >= 0.8 ? 'warn' : 'good';
}

function changeMonth(d) {
  curMonth += d;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0) { curMonth = 11; curYear--; }
  render();
}

function switchTab(idx) {
  curTab = idx;
  for (var i = 0; i < 3; i++) {
    var t = document.getElementById('tab' + i);
    if (i === idx) t.classList.add('active'); else t.classList.remove('active');
  }
  document.getElementById('slideInner').style.transform = 'translateX(-' + (idx * 100) + '%)';
  render();
}

function render() {
  document.getElementById('monthLbl').textContent = MONTHS[curMonth].slice(0, 3).toUpperCase() + ' ' + curYear;
  renderHero();
  renderOverview();
  renderLog();
  renderSavings();
}

function renderHero() {
  var spent = totalSpent(), budget = totalBudget(), left = budget - spent;
  var pct = budget > 0 ? Math.min(spent / budget, 1) : 0;
  var r = 32, circ = 2 * Math.PI * r;
  var st = stat(spent, budget);
  var rc = st === 'over' ? '#E84B2A' : st === 'warn' ? '#A86000' : '#0D0D0D';
  var dash = (circ * pct).toFixed(1);
  var rest = circ.toFixed(1);

  document.getElementById('heroEl').innerHTML =
    '<div class="hero-eye">Spent \u2014 ' + MONTHS[curMonth] + '</div>' +
    '<div style="position:relative">' +
      '<div class="hero-num">' + fmt(spent) + '<em>.</em></div>' +
      '<div class="ring-wrap">' +
        '<svg viewBox="0 0 82 82">' +
          '<circle class="r-track" cx="41" cy="41" r="' + r + '"/>' +
          '<circle class="r-fill" cx="41" cy="41" r="' + r + '" stroke="' + rc + '" stroke-dasharray="' + dash + ' ' + rest + '"/>' +
        '</svg>' +
        '<div class="ring-lbl">' + Math.round(pct * 100) + '%<small>used</small></div>' +
      '</div>' +
    '</div>' +
    '<div class="hero-meta">' +
      '<div><div class="hm-lbl">Budget</div><div class="hm-val">' + fmt(budget) + '</div></div>' +
      '<div><div class="hm-lbl">' + (left >= 0 ? 'Left' : 'Over') + '</div><div class="hm-val ' + (left >= 0 ? 'pos' : 'neg') + '">' + fmt(Math.abs(left)) + '</div></div>' +
      '<div><div class="hm-lbl">Saved</div><div class="hm-val pos">' + fmt(savTotal) + '</div></div>' +
    '</div>';
}

function renderOverview() {
  var h = '<div class="sec-lbl">Categories</div>';
  for (var i = 0; i < cats.length; i++) {
    var cat = cats[i];
    var spent = spentIn(cat.id);
    var pct = cat.budget > 0 ? Math.min(spent / cat.budget, 1) : 0;
    var st = stat(spent, cat.budget);
    h += '<div class="cat-row s-' + st + '" data-catid="' + cat.id + '">' +
      '<div class="cat-ic">' + svgIcon(cat.id) + '</div>' +
      '<div class="cat-mid">' +
        '<div class="cat-name">' + cat.name + '</div>' +
        '<div class="cat-track"><div class="cat-bar" style="width:' + (pct * 100).toFixed(1) + '%"></div></div>' +
      '</div>' +
      '<div class="cat-right">' +
        '<div class="cat-spent">' + fmt(spent) + '</div>' +
        '<div class="cat-of">/ ' + fmt(cat.budget) + '</div>' +
      '</div>' +
    '</div>';
  }
  h += '<button class="add-cat" id="btnAddCat">+ Add category</button>';
  document.getElementById('page0').innerHTML = h;

  // Wire category row clicks
  var rows = document.querySelectorAll('.cat-row');
  for (var j = 0; j < rows.length; j++) {
    (function(row) {
      row.addEventListener('click', function() { openEdit(row.getAttribute('data-catid')); });
    })(rows[j]);
  }
  document.getElementById('btnAddCat').addEventListener('click', openNewCat);
}

function renderLog() {
  var key = mk();
  var entries = [];
  for (var i = 0; i < exps.length; i++) if (exps[i].mk === key) entries.push(exps[i]);
  entries.sort(function(a, b) { return b.date < a.date ? -1 : b.date > a.date ? 1 : 0; });

  if (!entries.length) {
    document.getElementById('page1').innerHTML = '<div class="empty">No expenses yet this month.<br>Tap + to add one.</div>';
    return;
  }

  var groups = {}, order = [];
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var parts = e.date.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    var dk = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
    if (!groups[dk]) { groups[dk] = []; order.push(dk); }
    groups[dk].push(e);
  }

  var h = '';
  for (var g = 0; g < order.length; g++) {
    h += '<div class="log-date">' + order[g] + '</div>';
    var items = groups[order[g]];
    for (var j = 0; j < items.length; j++) {
      var exp = items[j];
      var cat = null;
      for (var k = 0; k < cats.length; k++) if (cats[k].id === exp.catId) { cat = cats[k]; break; }
      if (!cat) cat = {id:'misc', name:'Other'};
      h += '<div class="log-item">' +
        '<div class="log-ic">' + svgIcon(cat.id, 15) + '</div>' +
        '<div class="log-mid"><div class="log-desc">' + (exp.desc || cat.name) + '</div><div class="log-sub">' + cat.name + '</div></div>' +
        '<div style="display:flex;align-items:center">' +
          '<div class="log-amt">\u2212' + fmt(exp.amt) + '</div>' +
          '<button class="log-del" data-expid="' + exp.id + '">\u00d7</button>' +
        '</div>' +
      '</div>';
    }
  }
  document.getElementById('page1').innerHTML = h;

  var delBtns = document.querySelectorAll('.log-del');
  for (var d2 = 0; d2 < delBtns.length; d2++) {
    (function(btn) {
      btn.addEventListener('click', function() { delExp(btn.getAttribute('data-expid')); });
    })(delBtns[d2]);
  }
}

function renderSavings() {
  var pct = savGoal > 0 ? Math.min(savTotal / savGoal, 1) : 0;
  var h = '<div class="sav-card">' +
    '<div class="sav-eye">House fund</div>' +
    '<div class="sav-total">' + fmt(savTotal) + '</div>' +
    '<div class="sav-goal-row"><span>Goal: ' + fmt(savGoal) + '</span><span>' + (pct * 100).toFixed(1) + '%</span></div>' +
    '<div class="sav-track"><div class="sav-fill" style="width:' + (pct * 100).toFixed(1) + '%"></div></div>' +
    '<div class="sav-to-go"><strong>' + fmt(savGoal - savTotal) + '</strong> to go</div>' +
    '<div class="sav-btns">' +
      '<button class="sav-btn sav-btn-add" id="btnSavAdd">+ Add</button>' +
      '<button class="sav-btn sav-btn-goal" id="btnSavGoal">Set goal</button>' +
    '</div>' +
  '</div><div class="sav-hist-lbl">History</div>';

  if (!savEntries.length) {
    h += '<div class="empty">No savings yet.<br>Add your first deposit above.</div>';
  } else {
    var rev = savEntries.slice().reverse();
    for (var i = 0; i < rev.length; i++) {
      var e = rev[i];
      var parts = e.date.split('-');
      var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
      var ds = d.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
      h += '<div class="sav-entry">' +
        '<div><div class="sav-note">' + (e.note || 'Deposit') + '</div><div class="sav-date">' + ds + '</div></div>' +
        '<div class="sav-right">' +
          '<div class="sav-amt">+' + fmt(e.amt) + '</div>' +
          '<button class="sav-del" data-savid="' + e.id + '">\u00d7</button>' +
        '</div>' +
      '</div>';
    }
  }
  document.getElementById('page2').innerHTML = h;

  document.getElementById('btnSavAdd').addEventListener('click', function() { openSav('add'); });
  document.getElementById('btnSavGoal').addEventListener('click', function() { openSav('goal'); });

  var delBtns = document.querySelectorAll('.sav-del');
  for (var d2 = 0; d2 < delBtns.length; d2++) {
    (function(btn) {
      btn.addEventListener('click', function() { delSav(btn.getAttribute('data-savid')); });
    })(delBtns[d2]);
  }
}

function openAdd() {
  document.getElementById('expAmt').value = '';
  document.getElementById('expDesc').value = '';
  var today = new Date();
  var mm = today.getMonth() + 1;
  var dd = today.getDate();
  document.getElementById('expDate').value = today.getFullYear() + '-' + (mm < 10 ? '0' : '') + mm + '-' + (dd < 10 ? '0' : '') + dd;
  selCatId = cats.length > 0 ? cats[0].id : '';
  buildGrid();
  openOv('addOv');
}

function buildGrid() {
  var h = '';
  for (var i = 0; i < cats.length; i++) {
    var c = cats[i];
    h += '<div class="cat-opt' + (c.id === selCatId ? ' sel' : '') + '" data-cid="' + c.id + '">' +
      svgIcon(c.id, 16) + c.name +
    '</div>';
  }
  document.getElementById('catGrid').innerHTML = h;
  var opts = document.querySelectorAll('.cat-opt');
  for (var j = 0; j < opts.length; j++) {
    (function(opt) {
      opt.addEventListener('click', function() {
        selCatId = opt.getAttribute('data-cid');
        buildGrid();
      });
    })(opts[j]);
  }
}

function saveExp() {
  var amtStr = document.getElementById('expAmt').value;
  var amt = parseFloat(amtStr);
  var desc = document.getElementById('expDesc').value.trim();
  var date = document.getElementById('expDate').value;
  if (!amt || amt <= 0) { toast('Enter an amount'); return; }
  if (!selCatId) { toast('Select a category'); return; }
  if (!date) { toast('Pick a date'); return; }
  var parts = date.split('-');
  exps.push({
    id: String(Date.now()),
    amt: amt,
    desc: desc,
    catId: selCatId,
    date: date,
    mk: parts[0] + '-' + parts[1]
  });
  persist();
  closeOv('addOv');
  render();
  toast('Saved \u2713');
}

function delExp(id) {
  var next = [];
  for (var i = 0; i < exps.length; i++) if (exps[i].id !== id) next.push(exps[i]);
  exps = next;
  persist();
  render();
}

function openEdit(catId) {
  var cat = null;
  for (var i = 0; i < cats.length; i++) if (cats[i].id === catId) { cat = cats[i]; break; }
  if (!cat) return;
  document.getElementById('editTitle').textContent = cat.name;
  document.getElementById('editAmt').value = String(cat.budget);
  document.getElementById('editCatId').value = catId;
  openOv('editOv');
}

function saveBudget() {
  var id = document.getElementById('editCatId').value;
  var amt = parseFloat(document.getElementById('editAmt').value);
  if (!amt || amt < 0) return;
  for (var i = 0; i < cats.length; i++) if (cats[i].id === id) { cats[i].budget = amt; break; }
  persist();
  closeOv('editOv');
  render();
  toast('Budget updated');
}

function openNewCat() {
  document.getElementById('ncName').value = '';
  document.getElementById('ncBudget').value = '';
  openOv('newCatOv');
}

function saveNewCat() {
  var name = document.getElementById('ncName').value.trim();
  var budget = parseFloat(document.getElementById('ncBudget').value);
  if (!name || !budget) { toast('Fill in name & budget'); return; }
  var id = 'c' + String(Date.now());
  SVG_PATHS[id] = SVG_PATHS.custom;
  cats.push({id: id, name: name, budget: budget});
  persist();
  closeOv('newCatOv');
  render();
  toast('Category added');
}

function openSav(mode) {
  savMode = mode;
  document.getElementById('savTitle').textContent = mode === 'add' ? 'Add to savings' : 'Set goal';
  document.getElementById('savAmt').value = mode === 'goal' ? String(savGoal) : '';
  document.getElementById('savNoteWrap').style.display = mode === 'add' ? '' : 'none';
  if (mode === 'add') document.getElementById('savNote').value = '';
  openOv('savOv');
}

function confirmSav() {
  var amt = parseFloat(document.getElementById('savAmt').value);
  if (!amt || amt <= 0) return;
  if (savMode === 'goal') {
    savGoal = amt;
  } else {
    var note = document.getElementById('savNote').value.trim();
    savTotal += amt;
    savEntries.push({id: String(Date.now()), amt: amt, note: note, date: new Date().toISOString().split('T')[0]});
  }
  persist();
  closeOv('savOv');
  render();
  toast(savMode === 'goal' ? 'Goal updated' : 'Savings added');
}

function delSav(id) {
  for (var i = 0; i < savEntries.length; i++) if (savEntries[i].id === id) { savTotal -= savEntries[i].amt; break; }
  var next = [];
  for (var j = 0; j < savEntries.length; j++) if (savEntries[j].id !== id) next.push(savEntries[j]);
  savEntries = next;
  persist();
  render();
}

function openOv(id) { document.getElementById(id).classList.add('open'); }
function closeOv(id) { document.getElementById(id).classList.remove('open'); }

var toastT;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function() { el.classList.remove('show'); }, 2000);
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
